#!/usr/bin/env python3
"""
cheapest_pipeline.py — 2D Cartoon Story Video Generator
Cost: ~$0.01 per 10-min video (DeepSeek API only)
Dependencies: openai, edge-tts, requests, ffmpeg
"""

import os
import re
import json
import time
import asyncio
import subprocess
from pathlib import Path
from typing import List, Dict, Tuple

import requests
from openai import OpenAI
import edge_tts

# ============ CONFIGURATION ============
DEEPSEEK_API_KEY = os.getenv("DEEPSEEK_API_KEY", "your-deepseek-key")
HF_TOKEN = os.getenv("HF_TOKEN", "your-huggingface-token")  # Optional, but higher rate-limit
OUTPUT_DIR = Path("./output")
IMAGES_DIR = OUTPUT_DIR / "images"
AUDIO_DIR = OUTPUT_DIR / "audio"
CLIPS_DIR = OUTPUT_DIR / "clips"
OUTPUT_DIR.mkdir(exist_ok=True)
IMAGES_DIR.mkdir(exist_ok=True)
AUDIO_DIR.mkdir(exist_ok=True)
CLIPS_DIR.mkdir(exist_ok=True)

# Language to EdgeTTS voice mapping
VOICE_MAP = {
    "hindi": "hi-IN-SwaraNeural",
    "urdu": "ur-PK-UzmaNeural",
    "arabic": "ar-EG-SalmaNeural",
    "english": "en-US-JennyNeural",
    "bengali": "bn-IN-TanishaaNeural",
}
DEFAULT_VOICE = "en-US-JennyNeural"

# ============ 1. COMPRESSED PROMPT (Machine-Readable Version) ============
SYSTEM_PROMPT = """
You are 2D STORY ENGINE. Follow these rules strictly.

CONFIG:
- Language: {language}
- Duration: {duration} min → scene_count = floor(duration * 7.5)
- Style: "2D cel-shaded cartoon, warm natural light, 16:9, clean outlines, no 3D"
- Culture: auto-map from language.

RULES:
- Dialogue ONLY in {language}. Everything else in English.
- No narrator.
- Filenames: lowercase_underscore_only.
- Scene labels: scene_one, scene_two... (spelled words).
- Max 2 dialogue lines per scene. Each scene ≤ 8 seconds.

WORKFLOW:
1. Generate 5 story ideas (numbered 1-5) with title + 1-sentence summary, culturally matched. Ask user to pick one.
2. Generate a dialogue-only script. Format: CHARACTER: "dialogue".
3. Generate 1 character prompt per speaker (full turnaround + expressions, white bg).
4. Generate 1 environment prompt per location (wide establishing shot, no characters).
5. Generate scene_image prompts for EVERY scene (one paragraph each, starts with scene_one, scene_two...).
6. Generate video prompts for EVERY scene (one paragraph each, starts with scene_one, scene_two...).

OUTPUT FORMAT (MACHINE-READABLE — CRITICAL):
After generating everything, output a single JSON object with EXACTLY this structure:
{
  "story_choice": 1,
  "script": [{"character": "Raj", "dialogue": "Namaste!"}, ...],
  "characters": [{"filename": "raj", "prompt": "..."}],
  "environments": [{"filename": "village_road", "prompt": "..."}],
  "scenes": [
    {
      "id": "scene_one",
      "image_prompt": "scene_one — village_road, raj, smiling and waving. {STYLE}",
      "video_prompt": "scene_one — raj waves at camera, slow push-in. Dialogue: 'Raj: \"Namaste!\"' (lip sync). {STYLE}",
      "dialogue_lines": ["Raj: \"Namaste!\""]
    }
  ]
}
Use the exact keys. Put ONLY the JSON in your final response. Do not add extra text outside the JSON block.
{STYLE} = "2D cel-shaded cartoon, warm natural light, 16:9, clean outlines, no 3D, no photorealistic"
"""

# ============ 2. HELPER: Call DeepSeek ============
def generate_story(language: str, duration: int) -> dict:
    """Call DeepSeek and return parsed JSON story."""
    client = OpenAI(
        api_key=DEEPSEEK_API_KEY,
        base_url="https://api.deepseek.com/v1"
    )
    prompt = SYSTEM_PROMPT.format(language=language, duration=duration)
    
    # We simulate the "user picks story" by just asking for a Village Life story by default
    # In production, you'd implement the interactive loop. For automation, pick type 1.
    user_input = f"Language: {language}. Duration: {duration} min. Story type: 1 (Village Life). Pick a story idea and generate everything."
    
    response = client.chat.completions.create(
        model="deepseek-chat",
        messages=[
            {"role": "system", "content": prompt},
            {"role": "user", "content": user_input}
        ],
        temperature=0.7,
        max_tokens=8000,
        response_format={"type": "json_object"}  # Forces JSON output
    )
    return json.loads(response.choices[0].message.content)

# ============ 3. HELPER: Generate Image (HuggingFace Free) ============
def generate_image(prompt: str, filename: str, retries: int = 3) -> str:
    """Generate image via HuggingFace free inference API."""
    # Append style bible explicitly since DeepSeek might omit it
    full_prompt = f"{prompt}, 2D cel-shaded cartoon, warm natural light, 16:9, clean outlines"
    
    api_url = "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0"
    headers = {"Authorization": f"Bearer {HF_TOKEN}"} if HF_TOKEN else {}
    
    for attempt in range(retries):
        try:
            response = requests.post(api_url, headers=headers, json={"inputs": full_prompt})
            if response.status_code == 200:
                path = IMAGES_DIR / f"{filename}.jpg"
                with open(path, "wb") as f:
                    f.write(response.content)
                return str(path)
            elif response.status_code == 503:
                # Model loading, wait and retry
                wait = 20 * (attempt + 1)
                print(f"⏳ HF model loading, waiting {wait}s...")
                time.sleep(wait)
            else:
                print(f"⚠️ HF error {response.status_code}: {response.text}")
                time.sleep(5)
        except Exception as e:
            print(f"⚠️ Image gen attempt {attempt+1} failed: {e}")
            time.sleep(10)
    
    # Fallback: generate a color placeholder if HF fails
    print(f"❌ Image generation failed for {filename}, creating placeholder...")
    placeholder_path = IMAGES_DIR / f"{filename}.jpg"
    subprocess.run([
        "ffmpeg", "-f", "lavfi", "-i", "color=c=blue:s=1920x1080:d=1",
        "-frames:v", "1", str(placeholder_path)
    ], check=False)
    return str(placeholder_path)

# ============ 4. HELPER: Generate TTS (Edge TTS Free) ============
async def generate_tts(text: str, filename: str, lang: str) -> str:
    """Generate speech via Edge TTS (free, unlimited)."""
    voice = VOICE_MAP.get(lang.lower(), DEFAULT_VOICE)
    # Clean text for filename
    clean_text = re.sub(r'[^a-zA-Z0-9\s]', '', text)[:50]
    path = AUDIO_DIR / f"{filename}.mp3"
    
    communicate = edge_tts.Communicate(text, voice)
    await communicate.save(str(path))
    return str(path)

# ============ 5. HELPER: Create Scene Video (FFmpeg Ken Burns) ============
def create_scene_video(image_path: str, audio_path: str, output_path: str, duration: int = 8):
    """
    Create a single scene video using FFmpeg:
    - Ken Burns zoom/pan on static image
    - Audio overlay
    - 24fps, 1920x1080, H.264
    """
    # Dynamic zoom: start at 1.0, end at ~1.3 over `duration` seconds
    # d = duration * 24 (frames at 24fps)
    frames = duration * 24
    zoom_filter = (
        f"zoompan=z='min(zoom+0.0015,1.3)':d={frames}:"
        f"s=1920x1080:format=yuv420p,fps=24"
    )
    
    cmd = [
        "ffmpeg",
        "-loop", "1",
        "-i", image_path,
        "-i", audio_path,
        "-vf", zoom_filter,
        "-c:v", "libx264",
        "-c:a", "aac",
        "-b:a", "128k",
        "-pix_fmt", "yuv420p",
        "-shortest",
        "-y",  # overwrite
        output_path
    ]
    result = subprocess.run(cmd, capture_output=True, text=True)
    if result.returncode != 0:
        print(f"⚠️ FFmpeg error for {output_path}: {result.stderr}")
        raise RuntimeError(f"FFmpeg failed: {result.stderr}")
    return output_path

# ============ 6. MAIN PIPELINE ============
async def main():
    print("🚀 Starting cheapest pipeline...")
    
    # --- Get user inputs (hardcoded for automation, or CLI args) ---
    language = os.getenv("STORY_LANG", "hindi")
    duration = int(os.getenv("STORY_DURATION", "10"))  # minutes
    
    print(f"📝 Generating story with DeepSeek...")
    story_data = generate_story(language, duration)
    
    # Save story JSON for debugging
    with open(OUTPUT_DIR / "story.json", "w", encoding="utf-8") as f:
        json.dump(story_data, f, indent=2, ensure_ascii=False)
    
    scenes = story_data["scenes"]
    print(f"✅ Generated {len(scenes)} scenes.")
    
    # --- Generate images (parallel with delays to avoid HF rate limits) ---
    print("🖼️ Generating images (this may take a while)...")
    for idx, scene in enumerate(scenes):
        # Generate environment + character images once
        env = scene.get("environment_prompt") or scene.get("image_prompt")
        # Actually, we need to generate each scene image separately.
        # The prompt already contains scene_one, scene_two etc.
        image_prompt = scene["image_prompt"]
        img_filename = f"scene_{idx+1:03d}"
        scene["image_path"] = generate_image(image_prompt, img_filename)
        print(f"  ✅ Scene {idx+1}/{len(scenes)} image done")
        time.sleep(2)  # Be gentle to HF free tier
    
    # --- Generate TTS for each dialogue line ---
    print("🔊 Generating TTS...")
    all_dialogues = []
    for idx, scene in enumerate(scenes):
        for line in scene.get("dialogue_lines", []):
            # Parse "Character: "dialogue""
            match = re.match(r'^([^:]+):\s*"(.+)"$', line.strip())
            if match:
                char, text = match.groups()
                audio_filename = f"audio_{idx+1:03d}_{char[:10]}"
                audio_path = await generate_tts(text, audio_filename, language)
                all_dialogues.append({
                    "scene_idx": idx,
                    "character": char,
                    "text": text,
                    "audio_path": audio_path
                })
            else:
                print(f"⚠️ Could not parse dialogue: {line}")
    
    # Group audio by scene (take first dialogue per scene, or concatenate? 
    # For simplicity, we use the first dialogue line per scene as the audio.
    # For multi-line, we could concat them. Let's just use the first.
    scene_audio_map = {}
    for d in all_dialogues:
        if d["scene_idx"] not in scene_audio_map:
            scene_audio_map[d["scene_idx"]] = d["audio_path"]
    
    # --- Create scene videos ---
    print("🎬 Rendering videos with FFmpeg...")
    clip_paths = []
    for idx, scene in enumerate(scenes):
        img_path = scene["image_path"]
        audio_path = scene_audio_map.get(idx)
        if not audio_path:
            # Silent scene (fallback)
            silent_path = AUDIO_DIR / f"silent_{idx}.mp3"
            subprocess.run(["ffmpeg", "-f", "lavfi", "-i", "anullsrc", "-t", "8", "-y", str(silent_path)], check=True)
            audio_path = str(silent_path)
        
        clip_path = CLIPS_DIR / f"clip_{idx+1:03d}.mp4"
        create_scene_video(img_path, audio_path, str(clip_path), duration=8)
        clip_paths.append(str(clip_path))
        print(f"  ✅ Clip {idx+1}/{len(scenes)} rendered")
    
    # --- Concatenate all clips ---
    print("🧩 Concatenating final video...")
    concat_file = OUTPUT_DIR / "concat_list.txt"
    with open(concat_file, "w") as f:
        for path in clip_paths:
            f.write(f"file '{path}'\n")
    
    final_output = OUTPUT_DIR / "final_video.mp4"
    subprocess.run([
        "ffmpeg", "-f", "concat", "-safe", "0",
        "-i", str(concat_file),
        "-c", "copy", str(final_output)
    ], check=True)
    
    print(f"\n✅ SUCCESS! Final video: {final_output}")
    print(f"📊 Cost: ~$0.01 (DeepSeek API call) — Images/TTS/FFmpeg were FREE.")
    return str(final_output)

# ============ 7. ENTRY POINT ============
if __name__ == "__main__":
    asyncio.run(main())
